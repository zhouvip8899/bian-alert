<script>

// 使用共享库的TA库（扩展支持TD9）

<script>
// ==================== 本页扩展 (TD9等) ====================
  const RSI = (data, period = 14) => {
    if (data.length < period + 1) return null;
    let gains = 0, losses = 0;
    for (let i = data.length - period; i < data.length; i++) {
      const diff = data[i] - data[i-1];
      if (diff > 0) gains += diff; else losses -= diff;
    }
    const avgGain = gains / period, avgLoss = losses / period;
    if (avgLoss === 0) return 100;
    const rs = avgGain / avgLoss;
    return 100 - (100 / (1 + rs));
  };
  const SMA = (data, period) => {
    if (data.length < period) return null;
    const sum = data.slice(-period).reduce((a,b)=>a+b,0);
    return sum / period;
  };
  const EMA = (data, period) => {
    if (data.length < period) return null;
    const k = 2/(period+1);
    let ema = SMA(data.slice(0,period), period);
    for(let i=period;i<data.length;i++){
      ema = data[i]*k + ema*(1-k);
    }
    return ema;
  };
  const MACD = (data, f=12,s=26,sig=9) => {
    const emaF = (d,p) => {if(d.length<p)return null;let e=SMA(d.slice(0,p),p);for(let i=p;i<d.length;i++)e=d[i]*2/(p+1)+e*(1-2/(p+1));return e;};
    const ema12=emaF(data,f), ema26=emaF(data,s);
    if(!ema12||!ema26)return null;
    const dif=ema12-ema26;
    const macdLine=[dif];
    for(let i=s;i<data.length;i++){
      const e12=emaF(data.slice(0,i+1),f), e26=emaF(data.slice(0,i+1),s);
      if(e12&&e26) macdLine.push(e12-e26);
    }
    if(macdLine.length<sig)return{dif,signal:null,hist:null};
    let sma=macdLine.slice(0,sig).reduce((a,b)=>a+b,0)/sig;
    for(let i=sig;i<macdLine.length;i++) sma=macdLine[i]*2/(sig+1)+sma*(1-2/(sig+1));
    return{dif,signal:sma,hist:(dif-sma)*2};
  };
  const BollingerBands = (data, period=20, stdDev=2) => {
    if(data.length<period)return null;
    const sma=SMA(data,period);
    const variance=data.slice(-period).reduce((sum,val)=>sum+Math.pow(val-sma,2),0)/period;
    const sd=Math.sqrt(variance);
    const upper=sma+stdDev*sd,lower=sma-stdDev*sd;
    const pos=(data[data.length-1]-lower)/(upper-lower+0.0001)*100;
    return{sma,upper,lower,w:(upper-lower)/sma*100,pos};
  };
  const KDJ = (data, n=9,m1=3,m2=3) => {
    if(data.length<n+1)return null;
    const highs=[],lows=[];
    for(let i=data.length-n-1;i<data.length;i++){
      highs.push(Math.max(...data.slice(Math.max(0,i-8),i+1)));
      lows.push(Math.min(...data.slice(Math.max(0,i-8),i+1)));
    }
    const rsv=(data[data.length-1]-lows[lows.length-1])/(highs[highs.length-1]-lows[lows.length-1]+0.0001)*100;
    const k=50,m=50,d=50;
    const kVal=2/3*k+1/3*rsv,mVal=2/3*m+1/3*kVal,dVal=2/3*d+1/3*mVal;
    return{k:kVal,d:dVal,j:mVal*3-mVal*2};
  };
  const WilliamsR = (data, period=14) => {
    if(data.length<period)return null;
    const high=Math.max(...data.slice(-period));
    const low=Math.min(...data.slice(-period));
    return(high-data[data.length-1])/(high-low+0.0001)*-100;
  };
  const CCI = (data, period=20) => {
    if(data.length<period)return null;
    const tp=(Math.max(...data.slice(-period))+Math.min(...data.slice(-period))+data[data.length-1])/3;
    const sma=SMA(data,period);
    const mad=data.slice(-period).reduce((s,v)=>s+Math.abs(v-sma),0)/period;
    return mad===0?0:(tp-sma)/(0.015*mad);
  };
  const StochRSI = (data, period=14) => {
    if(data.length<period+1)return null;
    // 计算RSI序列
    let gains=[],losses=[];
    for(let i=1;i<data.length;i++){
      const diff=data[i]-data[i-1];
      gains.push(diff>0?diff:0);
      losses.push(diff<0?-diff:0);
    }
    // 取最后period个RSI
    if(gains.length<period)return null;
    const rsiValues=[];
    for(let i=0;i<=gains.length-period;i++){
      const avgGain=gains.slice(i,i+period).reduce((a,b)=>a+b,0)/period;
      const avgLoss=losses.slice(i,i+period).reduce((a,b)=>a+b,0)/period;
      const rs=avgLoss===0?100:avgGain/avgLoss;
      rsiValues.push(100-100/(1+rs));
    }
    if(rsiValues.length<period)return null;
    const lastRSI=rsiValues[rsiValues.length-1];
    const minRsi=Math.min(...rsiValues.slice(-period));
    const maxRsi=Math.max(...rsiValues.slice(-period));
    const stochRSI=maxRsi===minRsi?50:(lastRSI-minRsi)/(maxRsi-minRsi)*100;
    return{k:stochRSI,d:null,j:null};
  };
  const ATR = (high,low,close,period=14) => {
    if(high.length<period+1)return null;
    const trs=[];
    for(let i=1;i<high.length;i++){
      trs.push(Math.max(high[i]-low[i],Math.abs(high[i]-close[i-1]),Math.abs(low[i]-close[i-1])));
    }
    return trs.reduce((a,b)=>a+b,0)/trs.length;
  };
  const ADX = (high,low,close,period=14) => {
    if(high.length<period*2)return null;
    const pdm=[],mdm=[],trs=[];
    for(let i=1;i<high.length;i++){
      const hDiff=high[i]-high[i-1],lDiff=low[i-1]-low[i];
      pdm.push(hDiff>lDiff&&hDiff>0?hDiff:0);
      mdm.push(lDiff>hDiff&&lDiff>0?lDiff:0);
      trs.push(Math.max(high[i]-low[i],Math.abs(high[i]-close[i-1]),Math.abs(low[i]-close[i-1])));
    }
    const sumTR=trs.slice(0,period).reduce((a,b)=>a+b,0);
    const sumPDM=pdm.slice(0,period).reduce((a,b)=>a+b,0);
    const sumMDM=mdm.slice(0,period).reduce((a,b)=>a+b,0);
    if(sumTR===0)return null;
    const pdi=sumPDM/sumTR*100,mdi=sumMDM/sumTR*100;
    const dx=Math.abs(pdi-mdi)/(pdi+mdi+0.0001)*100;
    return{adx:dx,pdi,mdi};
  };
  const OBV = (close,vol) => {
    let obv=0;
    for(let i=1;i<close.length;i++){
      if(close[i]>close[i-1])obv+=vol[i];
      else if(close[i]<close[i-1])obv-=vol[i];
    }
    return obv;
  };
  const ROC = (data,period=10) => {
    if(data.length<period+1)return null;
    return(data[data.length-1]-data[data.length-period-1])/data[data.length-period-1]*100;
  };
  const MOM = (data,period=12) => {
    if(data.length<period+1)return null;
    return data[data.length-1]-data[data.length-period-1];
  };
  const tdSequentialFn = (data) => {
    if(data.length<10)return null;
    let buyCount=0,sellCount=0,buyPerfect=false,sellPerfect=false;
    const isBuyPhase=data[data.length-1]<data[data.length-5];
    const isSellPhase=data[data.length-1]>data[data.length-5];
    for(let i=data.length-9;i<data.length;i++){
      if(isBuyPhase&&data[i]<data[i-4])buyCount++;
      if(isSellPhase&&data[i]>data[i-4])sellCount++;
    }
    buyPerfect=buyCount===9;sellPerfect=sellCount===9;
    return{buyCount,sellCount,buyActive:buyCount>0&&!buyPerfect,sellActive:sellCount>0&&!sellPerfect,buyPerfect,sellPerfect};
  };
  return{
    rsi:RSI,sma:SMA,ema:EMA,macd:MACD,bb:BollingerBands,
    kdj:KDJ,wr:WilliamsR,cci:CCI,stochRsi:StochRSI,
    atr:ATR,adx:ADX,obv:OBV,roc:ROC,mom:MOM,
    tdSequential: TA.tdSequential || function() { return null; }
  };
})();
</script>

// ==================== 通用币安请求 ====================
async function getKlines(symbol, interval, limit = 200) {
  try {
    const result = await apiFetch(`/fapi/v1/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
    return result;
  } catch(e) {
    console.error('getKlines error:', e);
    return null;
  }
}

// ==================== 指标信号判定 ====================
function getSignal(type, value, threshold) {
  // 统一判断：null/undefined/NaN 都显示 --
  const isInvalid = value == null || (typeof value === 'number' && Number.isNaN(value)) || (typeof value === 'object' && Object.values(value).every(v => v == null || Number.isNaN(v)));
  if (isInvalid) return { label: '--', cls: 'sig-neutral', strength: 0 };
  switch(type) {
    case 'rsi':
      if (value < 30) return { label: '超卖 🟢', cls: 'sig-buy', strength: 80 };
      if (value < 40) return { label: '偏弱', cls: 'sig-buy', strength: 50 };
      if (value > 70) return { label: '超买 🔴', cls: 'sig-sell', strength: 80 };
      if (value > 60) return { label: '偏强', cls: 'sig-sell', strength: 50 };
      if (value >= 42 && value <= 58) return { label: '中性区域 📊', cls: 'sig-neutral', strength: 30 };
      return { label: '中性', cls: 'sig-neutral', strength: 20 };
    case 'kdj':
      if (value.j < 20) return { label: '超卖 🟢', cls: 'sig-buy', strength: 80 };
      if (value.j < 30) return { label: '偏弱', cls: 'sig-buy', strength: 50 };
      if (value.j > 80) return { label: '超买 🔴', cls: 'sig-sell', strength: 80 };
      if (value.j > 70) return { label: '偏强', cls: 'sig-sell', strength: 50 };
      if (value.k > value.d && value.d < 30) return { label: '金叉酝酿 🟢', cls: 'sig-buy', strength: 60 };
      return { label: '中性', cls: 'sig-neutral', strength: 20 };
    case 'wr':
      if (value < -90) return { label: '严重超卖 🟢', cls: 'sig-buy', strength: 90 };
      if (value < -80) return { label: '超卖 🟢', cls: 'sig-buy', strength: 80 };
      if (value < -50) return { label: '偏弱', cls: 'sig-buy', strength: 50 };
      if (value > -10) return { label: '超买 🔴', cls: 'sig-sell', strength: 80 };
      if (value > -20) return { label: '偏强', cls: 'sig-sell', strength: 50 };
      return { label: '中性', cls: 'sig-neutral', strength: 20 };
    case 'macd':
      if (value.hist > 0.5) return { label: '强势金叉 🟢', cls: 'sig-buy', strength: 85 };
      if (value.hist > 0.1) return { label: '金叉 🟢', cls: 'sig-buy', strength: 70 };
      if (value.hist > 0) return { label: '转多 🟢', cls: 'sig-buy', strength: 50 };
      if (value.hist < -0.5) return { label: '强势死叉 🔴', cls: 'sig-sell', strength: 85 };
      if (value.hist < -0.1) return { label: '死叉 🔴', cls: 'sig-sell', strength: 70 };
      return { label: '中性', cls: 'sig-neutral', strength: 20 };
    case 'cci':
      if (value > 200) return { label: '严重超买 🔴', cls: 'sig-sell', strength: 90 };
      if (value > 100) return { label: '超买 🔴', cls: 'sig-sell', strength: 80 };
      if (value > 50) return { label: '偏强', cls: 'sig-sell', strength: 50 };
      if (value < -200) return { label: '严重超卖 🟢', cls: 'sig-buy', strength: 90 };
      if (value < -100) return { label: '超卖 🟢', cls: 'sig-buy', strength: 80 };
      if (value < -50) return { label: '偏弱', cls: 'sig-buy', strength: 50 };
      return { label: '中性', cls: 'sig-neutral', strength: 20 };
    case 'stoch':
      if (value.k < 20) return { label: '超卖 🟢', cls: 'sig-buy', strength: 80 };
      if (value.k > 80) return { label: '超买 🔴', cls: 'sig-sell', strength: 80 };
      if (value.k > value.d && value.d < 30) return { label: '金叉 🟢', cls: 'sig-buy', strength: 60 };
      return { label: '中性', cls: 'sig-neutral', strength: 20 };
    case 'adx':
      if (value.adx > 25) return { label: '趋势强 📈', cls: 'sig-buy', strength: 70 };
      return { label: '趋势弱', cls: 'sig-neutral', strength: 30 };
    case 'bb':
      if (value.pos < 10) return { label: '触及下轨 🟢', cls: 'sig-buy', strength: 80 };
      if (value.pos > 90) return { label: '触及上轨 🔴', cls: 'sig-sell', strength: 80 };
      if (value.w < 2) return { label: '极度挤压 ⚡', cls: 'sig-buy', strength: 90 };
      if (value.w < 3) return { label: '收口挤压 ⚡', cls: 'sig-buy', strength: 70 };
      return { label: '正常', cls: 'sig-neutral', strength: 40 };
    case 'roc':
      if (value > 5) return { label: '强势动能 📈', cls: 'sig-buy', strength: 70 };
      if (value > 2) return { label: '正向动能', cls: 'sig-buy', strength: 50 };
      if (value < -5) return { label: '弱势动能 📉', cls: 'sig-sell', strength: 70 };
      if (value < -2) return { label: '负向动能', cls: 'sig-sell', strength: 50 };
      return { label: '动能中性', cls: 'sig-neutral', strength: 20 };
  }
  return { label: '--', cls: 'sig-neutral', strength: 0 };
}

// ==================== 三维共振评分系统 (使用共享库) ====================
const calcScore = BinanceShared.calcScore3D;

// ==================== 渲染 K线图 ====================
function initChart() {
  if (chart) { chart.remove(); chart = null; }
  if (rsiChart) { rsiChart.remove(); rsiChart = null; }
  if (macdChart) { macdChart.remove(); macdChart = null; }

  const mainOpts = {
    layout: { background: { type: 'solid', color: '#161b22' }, textColor: '#8b949e', fontSize: 11 },
    grid: { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } },

  };

  // 主图
  const mainH = $('chart').clientHeight || Math.max(300, window.innerHeight * 0.45);
  chart = LightweightCharts.createChart($('chart'), { ...mainOpts, width: $('chart').clientWidth, height: mainH });

  candleSeries = chart.addCandlestickSeries({ upColor: '#3fb950', downColor: '#f85149', borderUpColor: '#3fb950', borderDownColor: '#f85149', wickUpColor: '#3fb950', wickDownColor: '#f85149' });

  maLines.ma99 = chart.addLineSeries({ color: '#3498db', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });

  maLines.ema25 = chart.addLineSeries({ color: '#9b59b6', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });

  bbLines.lower = chart.addLineSeries({ color: '#f39c12', lineWidth: 1, lineStyle: 2, priceLineVisible: false, lastValueVisible: false });
  bbLines.band = chart.addAreaSeries({ color: 'rgba(243,156,18,0.08)', lineColor: 'transparent', priceLineVisible: false, lastValueVisible: false });

  // TD9 markers
  if (MarkerShape) {
    tdMarkers.buy = chart.addMarkersSeries({ color: '#3fb950', markerType: MarkerShape.CIRCLE, markerSize: 7 });
    tdMarkers.sell = chart.addMarkersSeries({ color: '#f85149', markerType: MarkerShape.CIRCLE, markerSize: 7 });
    tdMarkers.buyPerfect = chart.addMarkersSeries({ color: '#3fb950', markerType: MarkerShape.ARROW_UP, markerSize: 10 });
    tdMarkers.sellPerfect = chart.addMarkersSeries({ color: '#f85149', markerType: MarkerShape.ARROW_DOWN, markerSize: 10 });
  }

  // RSI副图
  const rsiH = $('rsiChart').clientHeight || 100;
  rsiChart = LightweightCharts.createChart($('rsiChart'), {
    ...mainOpts,
    width: $('rsiChart').clientWidth,
    height: rsiH,
    timeScale: { visible: false }
  });
  rsiSeries = rsiChart.addLineSeries({ color: '#ff6b6b', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
  kdjLines.k = rsiChart.addLineSeries({ color: '#ffffff', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
  kdjLines.d = rsiChart.addLineSeries({ color: '#ffff00', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
  kdjLines.j = rsiChart.addLineSeries({ color: '#ff69b4', lineWidth: 1, priceLineVisible: false, lastValueVisible: false });
  wrSeries = rsiChart.addLineSeries({ color: '#da70d6', lineWidth: 1, lineStyle: 2, priceLineVisible: false, lastValueVisible: false });
  // RSI 30/70水平线
  rsiSeries30 = rsiChart.addLineSeries({ color: '#3fb950', lineWidth: 1, lineStyle: 2, priceLineVisible: false, lastValueVisible: false });

// 指标显示开关
function toggleInd(type, btn) {

// ==================== 渲染图表数据 ====================
function renderChart(klines) {
  lastKlines = klines;
  if (!candleSeries) return;

  const candleData = klines.map(k => ({
    time: k[0] / 1000,
    open: parseFloat(k[1]),
    high: parseFloat(k[2]),
    low: parseFloat(k[3]),
    close: parseFloat(k[4])
  }));
  cachedCandleData = candleData;

  const volumeData = klines.map(k => ({
    time: k[0] / 1000,
    value: parseFloat(k[5]),
    color: parseFloat(k[4]) >= parseFloat(k[1]) ? '#3fb950cc' : '#f85149aa'
  }));

  candleSeries.setData(candleData);
  volumeSeries.setData(volumeData);

  const closes = candleData.map(c => c.close);
  const ts = candleData.map(c => c.time);

  // === 主图: MA/EMA ===
  if (showMA) {
    const ma7d = TA.sma(closes, 7), ma25d = TA.sma(closes, 25), ma99d = TA.sma(closes, 99);
    const ema7d = TA.ema(closes, 7), ema25d = TA.ema(closes, 25);
    if (ma7d) maLines.ma7.setData(ts.map((t, i) => ({ time: t, value: ma7d })));
    if (ma25d) maLines.ma25.setData(ts.map((t, i) => ({ time: t, value: ma25d })));
    if (ma99d) maLines.ma99.setData(ts.map((t, i) => ({ time: t, value: ma99d })));
    if (ema7d) maLines.ema7.setData(ts.map((t, i) => ({ time: t, value: ema7d })));
    if (ema25d) maLines.ema25.setData(ts.map((t, i) => ({ time: t, value: ema25d })));
  }
  maLines.ma7.applyOptions({ visible: showMA });
  maLines.ma25.applyOptions({ visible: showMA });
  maLines.ma99.applyOptions({ visible: showMA });
  maLines.ema7.applyOptions({ visible: showMA });
  maLines.ema25.applyOptions({ visible: showMA });

  // === 主图: 布林带 ===
  if (showInd.bb && TA.bb) {
    const bb = TA.bb(closes);
    if (bb) {
      if (bb.upper) bbLines.upper.setData(ts.map((t, i) => ({ time: t, value: bb.upper[i] })));
      if (bb.sma) bbLines.mid.setData(ts.map((t, i) => ({ time: t, value: bb.sma[i] })));
      if (bb.lower) bbLines.lower.setData(ts.map((t, i) => ({ time: t, value: bb.lower[i] })));
      if (bb.upper && bb.lower) {
        bbLines.band.setData(ts.map((t, i) => ({ time: t, value: bb.upper[i], close: bb.lower[i] })));
      }
    }
  }
  bbLines.upper.applyOptions({ visible: showInd.bb });
  bbLines.mid.applyOptions({ visible: showInd.bb });
  bbLines.lower.applyOptions({ visible: showInd.bb });
  bbLines.band.applyOptions({ visible: showInd.bb });

  // === TD9标记 ===
  try { if (tdMarkers.buy) updateTD9Markers(candleData); } catch(e) {}

  // === 计算所有指标 ===
  const highs = klines.map(k => parseFloat(k[2]));
  const lows = klines.map(k => parseFloat(k[3]));
  const safe = (fn, fallback = null) => { try { const r = fn(); return (r == null || (typeof r === 'number' && isNaN(r))) ? fallback : r; } catch { return fallback; } };
  const ind = {
    rsi: safe(() => TA.rsi(closes, 14)),
    macd: safe(() => TA.macd(closes)),
    bb: safe(() => TA.bb(closes)),
    kdj: safe(() => TA.kdj(closes)),
    wr: safe(() => TA.wr(closes, 14)),
    cci: safe(() => TA.cci(closes)),
    stoch: safe(() => TA.stochRsi(closes)),
    mom: safe(() => TA.mom(closes, 12)),
    roc: safe(() => TA.roc(closes, 10)),
    atr: safe(() => TA.atr(highs, lows, closes)),
    ma7: safe(() => TA.sma(closes, 7)),
    ma25: safe(() => TA.sma(closes, 25)),
    ma99: safe(() => TA.sma(closes, 99)),
    ema7: safe(() => TA.ema(closes, 7)),
    ema25: safe(() => TA.ema(closes, 25)),
  };
  cachedInd = ind;

  // === RSI副图 ===
  if (rsiSeries) {
    const rsi = ind.rsi;
    if (rsi) {
      rsiSeries.setData(ts.map((t, i) => ({ time: t, value: rsi[i] })));
    }
    // KDJ
    if (showInd.kdj && ind.kdj) {
      kdjLines.k.setData(ts.map((t, i) => ({ time: t, value: ind.kdj.k[i] })));
      kdjLines.d.setData(ts.map((t, i) => ({ time: t, value: ind.kdj.d[i] })));
      kdjLines.j.setData(ts.map((t, i) => ({ time: t, value: ind.kdj.j[i] })));
    }
    kdjLines.k.applyOptions({ visible: showInd.kdj && !!ind.kdj });
    kdjLines.d.applyOptions({ visible: showInd.kdj && !!ind.kdj });
    kdjLines.j.applyOptions({ visible: showInd.kdj && !!ind.kdj });
    // WR (缩放到0-100范围)
    if (showInd.wr && ind.wr) {
      wrSeries.setData(ts.map((t, i) => ({ time: t, value: ind.wr[i] })));
    }
    wrSeries.applyOptions({ visible: showInd.wr && !!ind.wr });
    // CCI
    if (showInd.cci && ind.cci) {
      // CCI缩放到0-100区间叠加在RSI上
      // CCI正常范围-200~+200, 缩放: (cci+200)/400*100 -> 0~100
    }
    // 30/70水平线
    rsiSeries30.setData(ts.map(t => ({ time: t, value: 30 })));
    rsiSeries70.setData(ts.map(t => ({ time: t, value: 70 })));
  }

  // === MACD副图 ===
  if (macdSeries && ind.macd) {
    macdSeries.setData(ts.map((t, i) => {
      const h = ind.macd.hist[i];
      return { time: t, value: h, color: h >= 0 ? '#3fb95088' : '#f8514988' };
    }));
    if (ind.macd.dif) difSeries.setData(ts.map((t, i) => ({ time: t, value: ind.macd.dif[i] })));
    if (ind.macd.signal) deaSeries.setData(ts.map((t, i) => ({ time: t, value: ind.macd.signal[i] })));
  }

  // 更新图例
  $('legBB').style.opacity = showInd.bb ? '1' : '0.3';
  $('legKDJ').style.opacity = showInd.kdj ? '1' : '0.3';
  $('legWR').style.opacity = showInd.wr ? '1' : '0.3';
  $('legCCI').style.opacity = showInd.cci ? '1' : '0.3';

  // 更新侧边栏信号表
  try { renderOscillators(ind); } catch(e) {}

  chart.timeScale().fitContent();
}

// ==================== 更新TD9标记 ====================
function updateTD9Markers(candleData) {
  if (!candleData || candleData.length < 10) return;
  const closes = candleData.map(c => c.close);
  const td = TA.tdSequential(closes);
  if (!td) return;

  const buyMarkers = [], sellMarkers = [];
  const buyPerfectMarkers = [], sellPerfectMarkers = [];

  // 计算TD9买入/卖出设置
  for (let i = 9; i < closes.length; i++) {
    const isBuyPhase = closes[i] < closes[i - 4];
    const isSellPhase = closes[i] > closes[i - 4];

    let buyCount = 0, sellCount = 0;
    for (let j = i - 8; j <= i; j++) {
      if (isBuyPhase && closes[j] < closes[j - 4]) buyCount++;
      if (isSellPhase && closes[j] > closes[j - 4]) sellCount++;
    }

    if (buyCount === 9) {
      buyPerfectMarkers.push({ time: candleData[i].time, text: '9', color: '#3fb950' });
    } else if (buyCount > 0) {
      buyMarkers.push({ time: candleData[i].time, text: buyCount.toString(), color: '#3fb95088' });
    }

    if (sellCount === 9) {
      sellPerfectMarkers.push({ time: candleData[i].time, text: '9', color: '#f85149' });
    } else if (sellCount > 0) {
      sellMarkers.push({ time: candleData[i].time, text: sellCount.toString(), color: '#f8514988' });
    }
  }

  tdMarkers.buy.setData(buyMarkers);
  tdMarkers.sell.setData(sellMarkers);
  tdMarkers.buyPerfect.setData(buyPerfectMarkers);
  tdMarkers.sellPerfect.setData(sellPerfectMarkers);
  console.log('[TD9] Marker更新成功:', { buy: buyMarkers.length, sell: sellMarkers.length, buyPerfect: buyPerfectMarkers.length, sellPerfect: sellPerfectMarkers.length });
}

// ==================== 主分析函数 ====================
async function analyzeCoin(symbol) {
  if (!symbol) return;
  symbol = symbol.toUpperCase().trim();
  if (!symbol.endsWith('USDT')) symbol += 'USDT';
  currentSymbol = symbol;

  const dispSymbol = $('dispSymbol');
  const dispPrice = $('dispPrice');
  const dispChange = $('dispChange');
  const loadingEl = $('loading');
  const totalScore = $('totalScore');
  const totalDesc = $('totalDesc');

  if (dispSymbol) dispSymbol.textContent = symbol;
  if (dispPrice) dispPrice.textContent = '--';
  if (dispChange) dispChange.textContent = '--';
  if (loadingEl) loadingEl.style.display = 'flex';
  if (totalScore) totalScore.textContent = '--';
  if (totalDesc) totalDesc.innerHTML = '分析中...';

    // 无论成功失败，15秒后必须关闭loading
    const forceCloseLoading = () => {
      const le = $('loading');
      const td = $('totalDesc');
      if (le) le.style.display = 'none';
      if (td && td.innerHTML === '分析中...') td.innerHTML = '加载超时，请刷新或重试';
    };
    const forceTimer = setTimeout(forceCloseLoading, 15000);

    try {
      const [klines4h, klines1h, ticker24h] = await Promise.all([
        getKlines(symbol, '4h', 200),
        getKlines(symbol, currentTf, 200),
        apiFetch(`/fapi/v1/ticker/24hr?symbol=${symbol}`)
      ]);
      
      // 保存ticker24h到全局变量供WebSocket实时更新使用
      globalTicker24h = ticker24h;
      clearTimeout(forceTimer);

      console.log('[涨跌幅] ticker24h:', ticker24h);
      console.log('[涨跌幅] priceChangePercent:', ticker24h?.priceChangePercent);
      console.log('[涨跌幅] klines1h长度:', klines1h?.length);
      console.log('[涨跌幅] klines1h首尾价格:', klines1h?.[0]?.[4], '->', klines1h?.[klines1h.length-1]?.[4]);

      if (!klines1h || klines1h.length < 20) {
        const le = $('loading');
        const td = $('totalDesc');
        if (le) le.style.display = 'none';
        if (td) td.innerHTML = '数据不足，请检查币种是否正确';
        return;
      }

    const closes1h = klines1h.map(k => parseFloat(k[4]));
    const volumes1h = klines1h.map(k => parseFloat(k[5]));
    const highs1h = klines1h.map(k => parseFloat(k[2]));
    const lows1h = klines1h.map(k => parseFloat(k[3]));

    // 安全调用TA函数（防止某个指标失败导致整体崩溃）
    const safe = (fn, fallback = null) => {
      try {
        const r = fn();
        if (r == null) return fallback;
        if (typeof r === 'number' && Number.isNaN(r)) return fallback;
        if (typeof r === 'object' && !Array.isArray(r)) {
          const vals = Object.values(r).filter(v => typeof v === 'number');
          if (vals.length === 0 || vals.every(v => Number.isNaN(v))) return fallback;
        }
        return r;
      } catch { return fallback; }
    };

    // 计算指标
    const ind = {
      rsi: safe(() => TA.rsi(closes1h, 14)),
      macd: safe(() => TA.macd(closes1h)),
      bb: safe(() => TA.bb(closes1h)),
      kdj: safe(() => TA.kdj(closes1h)),
      wr: safe(() => TA.wr(closes1h, 14)),
      cci: safe(() => TA.cci(closes1h)),
      stoch: safe(() => TA.stochRsi(closes1h)),
      adx: safe(() => TA.adx(highs1h, lows1h, closes1h)),
      mom: safe(() => TA.mom(closes1h, 12)),
      roc: safe(() => TA.roc(closes1h, 10)),
      atr: safe(() => TA.atr(highs1h, lows1h, closes1h)),
      ma7: safe(() => TA.sma(closes1h, 7)),
      ma25: safe(() => TA.sma(closes1h, 25)),
      ma99: safe(() => TA.sma(closes1h, 99)),
      ema7: safe(() => TA.ema(closes1h, 7)),
      ema25: safe(() => TA.ema(closes1h, 25)),
      td9: safe(() => TA.tdSequential(closes1h)),
      obv: safe(() => { const arr = TA.obv(closes1h, volumes1h); return Array.isArray(arr) ? arr[arr.length - 1] : arr; }),
      bb4h: klines4h ? safe(() => TA.bb(klines4h.map(k => parseFloat(k[4])))) : null,
    };

    // 计算涨跌幅（使用24hr API的真实数据）
    const price = closes1h[closes1h.length-1];
    const chg1h = closes1h.length > 1 ? (closes1h[closes1h.length-1] - closes1h[closes1h.length-2]) / closes1h[closes1h.length-2] * 100 : 0;
    const chg4hK = klines4h && klines4h.length > 1 ? (parseFloat(klines4h[klines4h.length-1][4]) - parseFloat(klines4h[klines4h.length-1][1])) / parseFloat(klines4h[klines4h.length-1][1]) * 100 : 0;
    // 使用24hr ticker的真实涨跌幅，避免K线计算误差
    const chg24h = ticker24h ? parseFloat(ticker24h.priceChangePercent) : (klines4h && klines4h.length >= 7
      ? (parseFloat(klines4h[klines4h.length-1][4]) - parseFloat(klines4h[klines4h.length-7][4])) / parseFloat(klines4h[klines4h.length-7][4]) * 100
      : chg4hK * 6);

    ind.chg1h = chg1h;
    ind.chg4h = chg4hK;
    ind.chg24h = chg24h;
    
    // 获取资金费率
    try {
      const frData = await apiFetch(`/fapi/v1/premiumIndex?symbol=${symbol}`);
      if (frData) {
        ind.fundingRate = parseFloat(frData.lastFundingRate || 0);
      }
    } catch(e) {
      ind.fundingRate = 0;
    }
    
    // 计算量比（简化版）
    const avgVol = volumes1h.slice(-20).reduce((a, b) => a + b, 0) / 20;
    const recentVol = volumes1h.slice(-5).reduce((a, b) => a + b, 0) / 5;
    ind.volumeRatio = avgVol > 0 ? recentVol / avgVol : 1;
    
    // 估算Taker买入比例（使用涨跌幅估算）
    if (chg1h > 0 && chg24h > 0) {
      ind.takerBuyRatio = 0.52 + Math.min(chg1h * 0.05, 0.1);
    } else if (chg1h < 0 && chg24h < 0) {
      ind.takerBuyRatio = 0.48 - Math.min(Math.abs(chg1h) * 0.05, 0.1);
    } else {
      ind.takerBuyRatio = 0.5;
    }

    // 渲染（renderChart已处理主图+副图+侧边栏）
    try { renderChart(klines1h); } catch(e) { console.error('renderChart:', e); }

    try {
      const scoreObj = { ...calcScore(ind), ind };
      renderSignals(scoreObj);
      renderTotalScore(scoreObj);
    } catch(e) { console.error('renderSignals:', e); }

    // 连接WebSocket实时K线
    try { connectWebSocket(symbol); } catch(e) { console.error('WebSocket连接:', e); }

    // 更新价格显示
    try {
      $('dispPrice').textContent = price.toFixed(price > 10 ? 2 : 6);
      const chgEl = $('dispChange');
      const chgVal = currentTf === '1h' ? chg1h : currentTf === '4h' ? chg4hK : chg24h;
      chgEl.textContent = `${chgVal >= 0 ? '+' : ''}${chgVal.toFixed(2)}%`;
      chgEl.className = `change ${chgVal >= 0 ? 'up' : 'down'}`;
      document.querySelectorAll('.coin-tag').forEach(t => {
        t.classList.toggle('active', t.textContent === symbol.replace('USDT',''));
      });
    } catch(e) { console.error('updateUI:', e); }

  } catch(e) {
    console.error('analyzeCoin error:', e);
    const le = $('loading');
    const td = $('totalDesc');
    if (le) le.style.display = 'none';
    if (td) td.innerHTML = '加载失败，请检查网络或刷新重试';
  }

  // 确保loading总是被关闭
  const finalLoading = $('loading');
  if (finalLoading) finalLoading.style.display = 'none';
}

// ==================== 实时K线WebSocket ====================
function connectWebSocket(symbol) {
  if (ws) {
    ws.close();
    ws = null;
  }

  const pair = symbol.replace('USDT', '').toLowerCase() + 'usdt';
  const tfMap = { '1m': '1m', '5m': '5m', '15m': '15m', '1h': '1h', '4h': '4h', '1d': '1d' };
  const interval = tfMap[currentTf] || '1h';

  // 币安合约WebSocket（多 streams 合并）
  const streams = `${pair}@kline_${interval}`;
  const wsUrl = `wss://fstream.binance.com/ws/${streams}`;

  try {
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      wsConnected = true;
      updateWsStatus(true);
      console.log('WebSocket已连接:', symbol, interval);
    };

    ws.onmessage = (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        if (!msg.k) return;

        const k = msg.k;
        const open = parseFloat(k.o);
        const high = parseFloat(k.h);
        const low = parseFloat(k.l);
        const close = parseFloat(k.c);
        const volume = parseFloat(k.v);
        const time = Math.floor(k.t / 1000);
        const isClosed = k.x; // 是否收盘（完整K线）

        // 更新K线图
        if (candleSeries && volumeSeries) {
          const candleData = { time, open, high, low, close };
          const volData = {
            time,
            value: volume,
            color: close >= open ? '#3fb95066' : '#f8514966'
          };

          if (isClosed) {
            // 完整K线，用 update
            candleSeries.update(candleData);
            volumeSeries.update(volData);
          } else {
            // 正在形成的K线，用 update 实时刷新
            candleSeries.update(candleData);
            volumeSeries.update(volData);
          }

          // 实时更新MA线
          if (showMA && lastKlines.length) {
            updateMARealTime(close, time);
          }
        }

        // 实时更新价格显示（优先使用24H涨跌幅）
        const price = close;
        const chgEl = $('dispChange');
        if (chgEl) {
          // 优先使用ticker24h的24H涨跌幅
          const chgVal = globalTicker24h ? parseFloat(globalTicker24h.priceChangePercent) : chg24h;
          $('dispPrice').textContent = price > 10 ? price.toFixed(2) : price.toFixed(6);
          chgEl.textContent = `${chgVal >= 0 ? '+' : ''}${chgVal.toFixed(2)}%`;
          chgEl.className = `change ${chgVal >= 0 ? 'up' : 'down'}`;
        }

        // 存储当前K线用于计算涨跌幅
        if (!realtimeCandle || realtimeCandle.time !== time) {
          realtimeCandle = { time, open, high, low, close, volume };
        } else {
          realtimeCandle.high = Math.max(realtimeCandle.high, high);
          realtimeCandle.low = Math.min(realtimeCandle.low, low);
          realtimeCandle.close = close;
          realtimeCandle.volume = volume;
        }

        // 每5秒刷新一次指标（避免过于频繁）
        const now = Date.now();
        if (now - lastUpdateTime > 5000) {
          lastUpdateTime = now;
          updateIndicatorsRealtime(close);
        }
      } catch(e) {
        console.error('WebSocket解析失败:', e);
      }
    };

    ws.onerror = (e) => {
      console.warn('WebSocket错误:', e);
      wsConnected = false;
      updateWsStatus(false);
    };

    ws.onclose = () => {
      wsConnected = false;
      updateWsStatus(false);
      // 断线后3秒重连
      setTimeout(() => {
        if (currentSymbol) connectWebSocket(currentSymbol);
      }, 3000);
    };
  } catch(e) {
    console.error('WebSocket连接失败:', e);
    wsConnected = false;
    updateWsStatus(false);
  }
}

function updateWsStatus(connected) {
  const existing = document.getElementById('wsIndicator');
  if (existing) {
    existing.textContent = connected ? '🔴 实时同步中' : '⚪ 已断开';
    existing.style.color = connected ? 'var(--green)' : 'var(--text2)';
  }
}

// 实时更新MA线（基于新价格）
function updateMARealTime(lastClose, time) {
  if (!lastKlines.length) return;

  const closes = lastKlines.map(k => parseFloat(k[4]));
  closes[closes.length - 1] = lastClose; // 用实时价格替换

  const ma7d = TA.sma(closes, 7), ma25d = TA.sma(closes, 25), ma99d = TA.sma(closes, 99);
  const ema7d = TA.ema(closes, 7), ema25d = TA.ema(closes, 25);

  const ts = [...lastKlines.map(k => k[0] / 1000), time];
  if (ma7d) maLines.ma7.update({ time, value: ma7d });
  if (ma25d) maLines.ma25.update({ time, value: ma25d });
  if (ma99d) maLines.ma99.update({ time, value: ma99d });
  if (ema7d) maLines.ema7.update({ time, value: ema7d });
  if (ema25d) maLines.ema25.update({ time, value: ema25d });
}

// 每5秒更新一次指标
function updateIndicatorsRealtime(lastClose) {
  if (!lastKlines.length) return;

  const closes = lastKlines.map(k => parseFloat(k[4]));
  closes[closes.length - 1] = lastClose;

  const highs = lastKlines.map(k => parseFloat(k[2]));
  const lows = lastKlines.map(k => parseFloat(k[3]));
  const volumes = lastKlines.map(k => parseFloat(k[5]));

  highs[highs.length - 1] = Math.max(highs[highs.length - 1], lastClose);
  lows[lows.length - 1] = Math.min(lows[lows.length - 1], lastClose);

  const safe = (fn, fallback = null) => {
    try {
      const r = fn();
      if (r == null) return fallback;
      if (typeof r === 'number' && Number.isNaN(r)) return fallback;
      return r;
    } catch { return fallback; }
  };

  const ind = {
    rsi: safe(() => TA.rsi(closes, 14)),
    macd: safe(() => TA.macd(closes)),
    bb: safe(() => TA.bb(closes)),
    kdj: safe(() => TA.kdj(closes)),
    wr: safe(() => TA.wr(closes, 14)),
    cci: safe(() => TA.cci(closes)),
    stoch: safe(() => TA.stochRsi(closes)),
    adx: safe(() => TA.adx(highs, lows, closes)),
    mom: safe(() => TA.mom(closes, 12)),
    roc: safe(() => TA.roc(closes, 10)),
    atr: safe(() => TA.atr(highs, lows, closes)),
    ma7: safe(() => TA.sma(closes, 7)),
    ma25: safe(() => TA.sma(closes, 25)),
    ma99: safe(() => TA.sma(closes, 99)),
    ema7: safe(() => TA.ema(closes, 7)),
    ema25: safe(() => TA.ema(closes, 25)),
    td9: safe(() => TA.tdSequential(closes)),
  };

  // 更新侧边栏信号表
  try { renderOscillators(ind); } catch(e) {}

  // 实时更新RSI副图
  try {
    if (rsiSeries && ind.rsi && cachedCandleData) {
      const lastRsi = ind.rsi[ind.rsi.length - 1];
      const lastTime = cachedCandleData[cachedCandleData.length - 1].time;
      if (lastRsi != null) rsiSeries.update({ time: lastTime, value: lastRsi });
      if (showInd.kdj && ind.kdj) {
        kdjLines.k.update({ time: lastTime, value: ind.kdj.k[ind.kdj.k.length - 1] });
        kdjLines.d.update({ time: lastTime, value: ind.kdj.d[ind.kdj.d.length - 1] });
        kdjLines.j.update({ time: lastTime, value: ind.kdj.j[ind.kdj.j.length - 1] });
      }
      if (showInd.wr && ind.wr) {
        wrSeries.update({ time: lastTime, value: ind.wr[ind.wr.length - 1] });
      }
    }
    // 实时更新MACD副图
    if (macdSeries && ind.macd && cachedCandleData) {
      const lastH = ind.macd.hist[ind.macd.hist.length - 1];
      const lastTime = cachedCandleData[cachedCandleData.length - 1].time;
      if (lastH != null) macdSeries.update({ time: lastTime, value: lastH, color: lastH >= 0 ? '#3fb95088' : '#f8514988' });
      if (ind.macd.dif) difSeries.update({ time: lastTime, value: ind.macd.dif[ind.macd.dif.length - 1] });
      if (ind.macd.signal) deaSeries.update({ time: lastTime, value: ind.macd.signal[ind.macd.signal.length - 1] });
    }
  } catch(e) {}

  // 更新评分
  try {
    const scoreObj = { ...calcScore(ind), ind };
    renderSignals(scoreObj);
    renderTotalScore(scoreObj);
  } catch(e) {}
}

// ==================== 推荐币种 ====================
async function loadRecommended() {
  const recEl = $('recCoins');
  if (!recEl) return;
  
  recEl.innerHTML = '<div style="padding:16px; text-align:center; color:var(--text2); font-size:13px;">⏳ 正在获取热门币种...</div>';
  console.log('[推荐币种] 开始加载...');
  
  // 直接获取24hr数据
  const r = await apiFetch(`/fapi/v1/ticker/24hr`);
  console.log('[推荐币种] API响应:', r ? `成功(${r.length}条)` : '失败/null');
  
  if (!r || !Array.isArray(r) || r.length === 0) {
    // 备用方案：硬编码主流币种
    const fallbackCoins = ['BTCUSDT', 'ETHUSDT', 'BNBUSDT', 'SOLUSDT', 'XRPUSDT', 'ADAUSDT', 'DOGEUSDT', 'MATICUSDT'];
    const recHtml = fallbackCoins.map(symbol => {
      return `<div class="rec-coin" onclick="analyzeCoin('${symbol}')">
        <div class="rc-left">
          <span class="rc-sym">${symbol.replace('USDT','')}</span>
          <span class="rc-name">点击加载</span>
        </div>
        <div class="rc-right">
          <span class="rc-price">--</span>
          <span class="rc-chg">--</span>
        </div>
      </div>`;
    }).join('');
    recEl.innerHTML = `<div style="padding:8px 16px; color:var(--orange); font-size:12px;">⚠️ 网络不稳定，显示备选币种</div>` + recHtml;
    console.log('[推荐币种] 使用备用方案');
    return;
  }
  
  // 筛选合约交易对，按成交量排序（排除MINI、杠杆代币、无效币种）
  const usdt = r.filter(t => {
    if (!t.symbol.endsWith('USDT')) return false;
    if (t.symbol.includes('MINI')) return false;
    if (t.symbol.includes('_')) return false;
    if (t.symbol.includes('BULL') || t.symbol.includes('BEAR')) return false;
    if (parseFloat(t.lastPrice) <= 0) return false;
    if (parseFloat(t.quoteVolume) < 1000000) return false;
    return true;
  })
    .sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume))
    .slice(0, 15);

  const recHtml = usdt.slice(0, 10).map(t => {
    const price = parseFloat(t.lastPrice);
    const chg = parseFloat(t.priceChangePercent);
    const vol = parseFloat(t.quoteVolume) / 1000000;
    const volLevel = vol > 100 ? '高流动性' : vol > 30 ? '中等' : '低';
    const isUp = chg >= 0;
    return `<div class="rec-coin" onclick="analyzeCoin('${t.symbol}')">
      <div class="rc-left">
        <span class="rc-sym">${t.symbol.replace('USDT','')}</span>
        <span class="rc-name">Vol: ${vol.toFixed(0)}M | ${volLevel}</span>
      </div>
      <div class="rc-right">
        <span class="rc-price">${price > 10 ? price.toFixed(2) : price.toFixed(6)}</span>
        <span class="rc-chg ${isUp ? 'up' : 'down'}">${isUp ? '+' : ''}${chg.toFixed(2)}%</span>
      </div>
    </div>`;
  }).join('');
  
  recEl.innerHTML = recHtml || '<div style="padding:16px; color:var(--text2);">暂无数据</div>';
  console.log('[推荐币种] 加载成功，共', usdt.length, '个');
}

// DOM ready后再init
function startup() {
  console.log('页面加载完成，开始初始化...');
  
  // 检查URL参数
  const urlParams = new URLSearchParams(window.location.search);
  const symbolParam = urlParams.get('symbol');
  if (symbolParam) {
    console.log('[URL参数] 检测到币种:', symbolParam);
    // 使用URL参数中的币种，先初始化图表再加载币种
    init().then(() => {
      currentSymbol = symbolParam;
      const symInput = $('symInput');
      if (symInput) symInput.value = symbolParam.replace('USDT', '');
      analyzeCoin(symbolParam);
    }).catch(e => {
      console.error('初始化失败:', e);
    });
    return;
  }
  
  init().catch(e => {
    console.error('初始化失败:', e);
    // 5秒后重试
    setTimeout(() => {
      console.log('重试初始化...');
      init().catch(console.error);
    }, 5000);
  });
}

// 立即执行，不要依赖 DOMContentLoaded（因为脚本可能在 body 底部）
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startup);
} else {
  // DOM已经加载完成
  startup();
}
