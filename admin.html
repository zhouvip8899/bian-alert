<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>会员管理后台 v3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#0f0f1a;min-height:100vh;color:#e0e0e0;padding:20px}
h1{color:#f0b90b;margin-bottom:6px;font-size:1.5em}
.sub{color:#666;font-size:.85em;margin-bottom:20px}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:18px;margin-bottom:16px}
.card h2{color:#f0b90b;font-size:.95em;margin-bottom:12px}
label{font-size:.8em;color:#888;display:block;margin-bottom:3px}
input,select{background:#1a1a2e;border:1px solid #333;color:#e0e0e0;border-radius:5px;padding:7px 10px;font-size:.9em;outline:none;margin-bottom:8px}
input:focus,select:focus{border-color:#f0b90b}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
button{padding:8px 16px;font-size:.85em;font-weight:600;border:none;border-radius:6px;cursor:pointer}
.btn-gold{background:#f0b90b;color:#000}
.btn-gold:hover{background:#fcd535}
.btn-red{background:rgba(239,83,80,.2);color:#ef5350;border:1px solid rgba(239,83,80,.3)}
.btn-gray{background:rgba(255,255,255,.1);color:#ccc;border:1px solid #333}
table{width:100%;border-collapse:collapse;font-size:.85em}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid rgba(255,255,255,.06)}
th{color:#888}
.hash-cell{font-family:monospace;color:#7c93ff;font-size:.75em}
.ok{color:#00e676}.no{color:#ef5350}.inf{color:#888}
#configBox{background:#0a0a14;border:1px solid rgba(240,185,11,.3);border-radius:8px;padding:12px;margin-top:12px;display:none}
#configPre{white-space:pre-wrap;word-break:break-all;font-size:.75em;color:#b0bec5;max-height:240px;overflow-y:auto;margin-bottom:10px;background:transparent;border:none}
#loginGate{position:fixed;inset:0;background:#0f0f1a;display:flex;align-items:center;justify-content:center;z-index:999}
.gate-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:30px 26px;min-width:280px;text-align:center}
.gate-box h2{color:#f0b90b;margin-bottom:14px}
.gate-box input{width:100%;padding:9px 12px;font-size:1em;background:#1a1a2e;border:1px solid #333;color:#e0e0e0;border-radius:6px;outline:none;margin-bottom:10px}
.gate-box button{width:100%;padding:10px;font-size:1em;font-weight:700;background:#f0b90b;border:none;border-radius:6px;cursor:pointer;color:#000}
.err{color:#ef5350;font-size:.82em;margin-top:6px;min-height:18px}
.tip{color:#666;font-size:.78em;margin-top:6px}
#msg{position:fixed;top:16px;right:16px;background:#1a2a1a;border:1px solid #00e676;color:#00e676;padding:10px 16px;border-radius:8px;font-size:.85em;display:none;z-index:9999}
#errmsg{position:fixed;top:16px;right:16px;background:#2a1a1a;border:1px solid #ef5350;color:#ef5350;padding:10px 16px;border-radius:8px;font-size:.85em;display:none;z-index:9999}
</style>
</head>
<body>

<!-- 成功/失败提示 -->
<div id="msg"></div>
<div id="errmsg"></div>

<!-- 管理员登录 -->
<div id="loginGate">
  <div class="gate-box">
    <h2>🔒 管理员入口</h2>
    <input type="password" id="adminPwd" placeholder="输入管理员密码">
    <button id="loginBtn">进入管理后台</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- 主界面 -->
<div id="mainArea" style="display:none">
  <h1>🔑 会员管理后台</h1>
  <p class="sub">管理授权码 · 生成配置文件</p>

  <!-- 新增 -->
  <div class="card">
    <h2>➕ 新增授权码</h2>
    <div class="row">
      <div>
        <label>授权码明文（发给用户）</label>
        <input type="text" id="inKey" placeholder="如 BIANVIP-2026-A001" style="min-width:200px">
      </div>
      <div>
        <label>备注</label>
        <input type="text" id="inLabel" placeholder="如 张三体验版" style="min-width:150px">
      </div>
      <div>
        <label>有效期</label>
        <select id="inExpire">
          <option value="0">永久</option>
          <option value="7">7天</option>
          <option value="30" selected>30天</option>
          <option value="90">90天</option>
          <option value="180">180天</option>
          <option value="365">1年</option>
        </select>
      </div>
      <div style="padding-bottom:8px">
        <button class="btn-gold" id="addBtn">生成并添加</button>
      </div>
    </div>
    <p class="tip">💡 明文授权码只弹出一次，请立即复制给用户</p>
  </div>

  <!-- 列表 -->
  <div class="card">
    <h2>📋 已有授权码（<span id="keyCount">0</span> 个）</h2>
    <table>
      <thead><tr><th>备注</th><th>哈希前16位</th><th>到期</th><th>操作</th></tr></thead>
      <tbody id="keyBody"></tbody>
    </table>
    <p class="tip" id="emptyHint">暂无授权码</p>
  </div>

  <!-- 导出 -->
  <div class="card">
    <h2>📤 导出 auth-config.js</h2>
    <p style="font-size:.85em;color:#888;margin-bottom:10px">点击生成 → 复制内容 → 替换本地 <code style="color:#f0b90b">auth-config.js</code></p>
    <button class="btn-gold" id="genBtn">📤 生成配置文件内容</button>
    <button class="btn-gray" id="clearBtn" style="margin-left:8px">清空全部</button>
    <div id="configBox">
      <pre id="configPre"></pre>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:8px">
        <button class="btn-gold" id="saveBtn">💾 一键写入 auth-config.js</button>
        <button class="btn-gray" id="copyBtn">📋 复制到剪贴板</button>
        <span id="copiedTip" style="color:#00e676;font-size:.82em;display:none">✅ 已复制</span>
        <span id="savedTip"  style="color:#00e676;font-size:.82em;display:none">✅ 已写入文件</span>
      </div>
      <p style="color:#888;font-size:.75em;margin-top:6px">💡 使用本地服务器（127.0.0.1:8766）时可直接写入文件，无需手动复制</p>
    </div>
  </div>
</div>

<script>
// ==================== 常量 ====================
var ADMIN_HASH = '5492d0491a55f87bcc0de2ef1ec544d089585c050fd23643d2968c75d35f1319'; // zhou101122692
var STORE_KEY  = 'bian-admin-keys-v2';

// ==================== 工具 ====================
function showMsg(txt) {
  var el = document.getElementById('msg');
  el.textContent = txt;
  el.style.display = 'block';
  setTimeout(function(){ el.style.display='none'; }, 3000);
}
function showErr(txt) {
  var el = document.getElementById('errmsg');
  el.textContent = txt;
  el.style.display = 'block';
  setTimeout(function(){ el.style.display='none'; }, 4000);
}
function sha256(str, cb) {
  var data = new TextEncoder().encode(str);
  crypto.subtle.digest('SHA-256', data).then(function(buf) {
    var hex = Array.from(new Uint8Array(buf)).map(function(b){ return ('0'+b.toString(16)).slice(-2); }).join('');
    cb(null, hex);
  }).catch(function(e){ cb(e); });
}
function getKeys() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); } catch(e) { return []; }
}
function saveKeys(arr) {
  localStorage.setItem(STORE_KEY, JSON.stringify(arr));
}

// ==================== 渲染表格 ====================
function renderTable() {
  var keys = getKeys();
  var tbody = document.getElementById('keyBody');
  var now   = Date.now();
  document.getElementById('keyCount').textContent = keys.length;
  document.getElementById('emptyHint').style.display = keys.length ? 'none' : '';
  tbody.innerHTML = '';
  for (var i = 0; i < keys.length; i++) {
    var k   = keys[i];
    var row = document.createElement('tr');
    var expCell;
    if (k.expire === 0) {
      expCell = '<span class="inf">永久</span>';
    } else if (k.expire < now) {
      expCell = '<span class="no">已过期 ' + new Date(k.expire).toLocaleDateString() + '</span>';
    } else {
      expCell = '<span class="ok">' + new Date(k.expire).toLocaleDateString() + '</span>';
    }
    row.innerHTML = '<td>' + (k.label||'') + '</td>'
      + '<td class="hash-cell">' + k.hash.slice(0,16) + '…</td>'
      + '<td>' + expCell + '</td>'
      + '<td><button class="btn-red" data-idx="' + i + '">删除</button></td>';
    tbody.appendChild(row);
  }
}

// 删除（事件委托）
document.getElementById('keyBody').addEventListener('click', function(e) {
  if (e.target && e.target.tagName === 'BUTTON') {
    var idx = parseInt(e.target.getAttribute('data-idx'));
    if (!confirm('确认删除此授权码？')) return;
    var keys = getKeys();
    keys.splice(idx, 1);
    saveKeys(keys);
    renderTable();
    showMsg('已删除');
  }
});

// ==================== 新增授权码 ====================
document.getElementById('addBtn').addEventListener('click', function() {
  var raw    = document.getElementById('inKey').value.trim();
  var label  = document.getElementById('inLabel').value.trim() || '未命名';
  var expVal = parseInt(document.getElementById('inExpire').value);
  if (!raw) { showErr('⚠️ 请输入授权码明文'); return; }
  var expire = expVal === 0 ? 0 : Date.now() + expVal * 86400000;
  sha256(raw.toUpperCase(), function(err, hash) {
    if (err) { showErr('❌ SHA256计算失败: ' + err.message); return; }
    var keys = getKeys();
    for (var i = 0; i < keys.length; i++) {
      if (keys[i].hash === hash) { showErr('⚠️ 该授权码已存在'); return; }
    }
    keys.push({ hash: hash, expire: expire, label: label, created: Date.now() });
    saveKeys(keys);
    renderTable();
    var expStr = expire === 0 ? '永久' : new Date(expire).toLocaleDateString();
    alert('✅ 添加成功！\n\n请立刻复制明文授权码发给用户：\n\n' + raw + '\n\n到期：' + expStr + '\n\n（明文不会再次显示）');
    document.getElementById('inKey').value   = '';
    document.getElementById('inLabel').value = '';
  });
});

// ==================== 生成配置 ====================
document.getElementById('genBtn').addEventListener('click', function() {
  var keys = getKeys();
  if (keys.length === 0) { showErr('⚠️ 暂无授权码，请先添加'); return; }
  var lines = [];
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var safeLabel = (k.label || '').replace(/\\/g,'\\\\').replace(/"/g,'\\"');
    lines.push('        { hash: "' + k.hash + '", expire: ' + k.expire + ', label: "' + safeLabel + '" }');
  }
  var ts  = new Date().toLocaleString();
  var txt = '/* 会员授权配置 auth-config.js - 由 admin.html 生成 ' + ts + ' */\n'
          + 'window.AUTH_CONFIG = {\n'
          + '    version: 1,\n'
          + '    keys: [\n'
          + lines.join(',\n') + '\n'
          + '    ]\n'
          + '};';
  document.getElementById('configPre').textContent = txt;
  document.getElementById('configBox').style.display = '';
  showMsg('✅ 配置生成成功，共 ' + keys.length + ' 条');
});

// ==================== 一键写入文件 ====================
document.getElementById('saveBtn').addEventListener('click', function() {
  var txt = document.getElementById('configPre').textContent;
  if (!txt) { showErr('⚠️ 请先点击「生成配置文件内容」'); return; }
  var btn = this;
  btn.disabled = true;
  btn.textContent = '写入中…';
  fetch('http://127.0.0.1:8766/save-auth-config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content: txt })
  }).then(function(r){ return r.json(); }).then(function(data) {
    btn.disabled = false;
    btn.textContent = '💾 一键写入 auth-config.js';
    if (data.ok) {
      document.getElementById('savedTip').style.display = '';
      setTimeout(function(){ document.getElementById('savedTip').style.display='none'; }, 3000);
      showMsg('✅ auth-config.js 已自动写入，刷新预警页面即生效');
    } else {
      showErr('❌ 写入失败：' + data.msg);
    }
  }).catch(function(e) {
    btn.disabled = false;
    btn.textContent = '💾 一键写入 auth-config.js';
    showErr('❌ 连接本地服务器失败，请确认服务器运行中（127.0.0.1:8766）');
  });
});

// ==================== 一键复制 ====================
document.getElementById('copyBtn').addEventListener('click', function() {
  var txt = document.getElementById('configPre').textContent;
  if (!txt) { showErr('⚠️ 请先生成配置'); return; }
  function done() {
    document.getElementById('copiedTip').style.display = '';
    setTimeout(function(){ document.getElementById('copiedTip').style.display='none'; }, 2500);
    showMsg('✅ 已复制到剪贴板');
  }
  if (window.navigator && navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(done).catch(function() { fallbackCopy(txt); done(); });
  } else {
    fallbackCopy(txt); done();
  }
});
function fallbackCopy(txt) {
  var ta = document.createElement('textarea');
  ta.value = txt;
  ta.style.cssText = 'position:fixed;left:-9999px;top:0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(e) { alert('请手动复制上方文本框内容'); }
  document.body.removeChild(ta);
}

// ==================== 清空 ====================
document.getElementById('clearBtn').addEventListener('click', function() {
  if (!confirm('确认清空全部授权码？')) return;
  saveKeys([]);
  renderTable();
  document.getElementById('configBox').style.display = 'none';
  showMsg('已清空');
});

// ==================== 管理员登录 ====================
document.getElementById('loginBtn').addEventListener('click', function() {
  var pwd = document.getElementById('adminPwd').value.trim();
  if (!pwd) return;
  sha256(pwd, function(err, hash) {
    if (err) { document.getElementById('loginErr').textContent = '系统错误: ' + err.message; return; }
    if (hash === ADMIN_HASH) {
      document.getElementById('loginGate').style.display  = 'none';
      document.getElementById('mainArea').style.display   = 'block';
      renderTable();
    } else {
      document.getElementById('loginErr').textContent = '❌ 密码错误';
      setTimeout(function(){ document.getElementById('loginErr').textContent=''; }, 2000);
    }
  });
});
document.getElementById('adminPwd').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});
</script>
</body>
</html>
