<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>币种详情</title>
<script src="lightweight-charts.standalone.production.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; background:#f5f5f5; color:#222; min-height:100vh; }

/* ===== Header ===== */
.top-bar {
  background:#fff;
  border-bottom:1px solid #e8e8e8;
  padding:14px 20px;
}
.top-bar-inner {
  max-width:1200px; margin:0 auto;
  display:flex; align-items:center; gap:16px;
}
.search-box {
  display:flex; gap:8px; align-items:center;
}
.search-box input {
  border:1px solid #d9d9d9; border-radius:4px; padding:6px 12px; font-size:14px; width:160px; outline:none;
}
.search-box input:focus { border-color:#1890ff; }
.search-box button {
  padding:6px 16px; background:#1890ff; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:14px;
}
.search-box button:hover { background:#40a9ff; }

/* ===== 基础信息区 ===== */
.info-block {
  background:#fff;
  padding:16px 20px 12px;
  border-bottom:1px solid #e8e8e8;
}
.info-inner { max-width:1200px; margin:0 auto; }
.coin-header {
  display:flex; align-items:center; gap:20px; flex-wrap:wrap; margin-bottom:12px;
}
.coin-logo {
  width:44px; height:44px; border-radius:50%;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-weight:700; font-size:16px; flex-shrink:0;
}
.coin-name-wrap { flex-shrink:0; }
.coin-name { font-size:22px; font-weight:700; color:#222; }
.coin-code { font-size:12px; color:#999; margin-top:2px; }
.coin-price {
  font-size:26px; font-weight:700; color:#f5222d;
  display:flex; flex-direction:column;
}
.coin-price-change { font-size:13px; color:#f5222d; margin-top:2px; }
.coin-price-change.up { color:#52c41a; }
.coin-stats {
  display:flex; gap:30px; flex-wrap:wrap; align-items:center;
}
.stat-item { text-align:center; }
.stat-item .s-label { font-size:12px; color:#999; margin-bottom:3px; }
.stat-item .s-val { font-size:14px; font-weight:600; color:#222; }
.coin-extra { margin-top:6px; }
.coin-extra .extra-label { font-size:12px; color:#999; }
.coin-extra .extra-val { font-size:13px; color:#222; margin-top:2px; }

/* ===== 数据面板区 ===== */
.panels {
  max-width:1200px; margin:12px auto;
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;
  padding:0 20px;
}
.panel {
  background:#fff; border-radius:4px; padding:16px;
  border:1px solid #e8e8e8;
}
.panel-title { font-size:13px; font-weight:600; color:#555; margin-bottom:12px; border-bottom:1px solid #f0f0f0; padding-bottom:8px; }
.data-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:5px 0; font-size:13px;
}
.data-row .dr-label { color:#555; }
.data-row .dr-val { font-weight:600; }
.data-row .dr-sub { font-size:11px; color:#999; }
.val-up { color:#52c41a; }
.val-down { color:#f5222d; }
.val-neutral { color:#1890ff; }

/* 爆仓面板 2列 */
.liq-panels {
  max-width:1200px; margin:0 auto;
  display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:12px;
  padding:0 20px 12px;
}
.liq-panel {
  background:#fff; border-radius:4px; padding:14px;
  border:1px solid #e8e8e8;
}
.liq-title { font-size:13px; color:#555; margin-bottom:10px; }
.liq-total { font-size:15px; font-weight:700; color:#222; margin-bottom:8px; }
.liq-row { display:flex; justify-content:space-between; font-size:12px; padding:3px 0; }
.liq-row .lr-label { color:#999; }
.liq-buy { color:#52c41a; }
.liq-sell { color:#f5222d; }

/* ===== K线区 ===== */
.chart-block {
  max-width:1200px; margin:0 auto 20px;
  padding:0 20px;
}
.chart-wrap {
  background:#111; border-radius:4px; overflow:hidden;
}
.chart-toolbar {
  display:flex; align-items:center; gap:8px; padding:10px 14px;
  background:#1a1a1a; border-bottom:1px solid #333;
  flex-wrap:wrap;
}
.chart-toolbar .symbol-label { color:#f0b90b; font-weight:700; font-size:14px; }
.tf-btn {
  padding:3px 10px; border:1px solid #444; background:transparent;
  color:#aaa; border-radius:3px; cursor:pointer; font-size:12px;
}
.tf-btn.active, .tf-btn:hover { background:#f0b90b; color:#000; border-color:#f0b90b; }
#chart { height:480px; }

/* ===== Loading ===== */
.loading-mask {
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(255,255,255,.85); display:flex;
  align-items:center; justify-content:center;
  flex-direction:column; gap:12px; z-index:999;
}
.spinner {
  width:36px; height:36px; border:3px solid #e8e8e8;
  border-top-color:#1890ff; border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-mask.hidden { display:none; }

/* ===== 响应式 ===== */
@media(max-width:900px){
  .panels { grid-template-columns:1fr 1fr; }
  .liq-panels { grid-template-columns:1fr 1fr; }
  .coin-stats { gap:14px; }
}
@media(max-width:600px){
  .panels { grid-template-columns:1fr; padding:0 10px; }
  .liq-panels { grid-template-columns:1fr 1fr; padding:0 10px; }
  .info-block { padding:12px; }
  .chart-block { padding:0 10px; }
  #chart { height:320px; }
}
</style>
</head>
<body>

<div class="loading-mask" id="loadingMask">
  <div class="spinner"></div>
  <div style="color:#555;font-size:14px" id="loadingTip">加载中...</div>
</div>

<!-- 搜索栏 -->
<div class="top-bar">
  <div class="top-bar-inner">
    <div class="search-box">
      <input type="text" id="symbolInput" placeholder="输入币种 如 BTC" />
      <button onclick="loadSymbol()">查询</button>
    </div>
    <span id="updateTime" style="font-size:12px;color:#999;margin-left:auto"></span>
  </div>
</div>

<!-- 基础信息 -->
<div class="info-block">
  <div class="info-inner">
    <div class="coin-header">
      <div class="coin-logo" id="coinLogo">-</div>
      <div class="coin-name-wrap">
        <div class="coin-name" id="coinName">--</div>
        <div class="coin-code" id="coinCode">--</div>
      </div>
      <div class="coin-price">
        <span id="coinPrice" style="color:#f5222d">--</span>
        <span class="coin-price-change" id="coinChange">--</span>
      </div>
      <div class="coin-stats" id="coinStats">
        <!-- 动态填充 -->
      </div>
    </div>
    <div class="coin-extra" id="coinExtra"></div>
  </div>
</div>

<!-- 数据面板（合约数据 / 多空比 / 爆仓） -->
<div class="panels" id="panelArea">
  <!-- 面板1：合约统计 -->
  <div class="panel">
    <div class="panel-title">📊 合约数据</div>
    <div id="contractPanel">
      <div class="data-row"><span class="dr-label">加载中...</span></div>
    </div>
  </div>
  <!-- 面板2：多空比 -->
  <div class="panel">
    <div class="panel-title">⚖️ 多空比</div>
    <div id="lsPanel">
      <div class="data-row"><span class="dr-label">加载中...</span></div>
    </div>
  </div>
  <!-- 面板3：资金费率 -->
  <div class="panel">
    <div class="panel-title">💰 资金费率 & OI</div>
    <div id="fundingPanel">
      <div class="data-row"><span class="dr-label">加载中...</span></div>
    </div>
  </div>
</div>

<!-- 爆仓面板 -->
<div class="liq-panels" id="liqArea">
  <div class="liq-panel" id="liq1h"><div class="liq-title">1小时爆仓</div><div style="color:#999;font-size:12px">加载中...</div></div>
  <div class="liq-panel" id="liq4h"><div class="liq-title">4小时爆仓</div><div style="color:#999;font-size:12px">加载中...</div></div>
  <div class="liq-panel" id="liq12h"><div class="liq-title">12小时爆仓</div><div style="color:#999;font-size:12px">加载中...</div></div>
  <div class="liq-panel" id="liq24h"><div class="liq-title">24小时爆仓</div><div style="color:#999;font-size:12px">加载中...</div></div>
</div>

<!-- K线图 -->
<div class="chart-block">
  <div class="chart-wrap">
    <div class="chart-toolbar">
      <span class="symbol-label" id="chartLabel">--</span>
      <span style="color:#888;font-size:12px;margin-right:8px">周期:</span>
      <button class="tf-btn" onclick="changeTf('15m')">15m</button>
      <button class="tf-btn active" onclick="changeTf('1h')">1H</button>
      <button class="tf-btn" onclick="changeTf('4h')">4H</button>
      <button class="tf-btn" onclick="changeTf('1d')">日线</button>
      <span style="color:#555;font-size:11px;margin-left:auto" id="klineStatus">--</span>
    </div>
    <div id="chart"></div>
  </div>
</div>

<script>
// ==================== 配置 ====================
const CORS_PROXIES = [
  'https://139.rams.cc.cd/?url=',
  'https://135.rams.cc.cd/?url=',
  'https://136.rams.cc.cd/?url=',
  'https://137.rams.cc.cd/?url='
];

let currentSymbol = 'BTCUSDT';
let currentTf = '1h';
let chart = null, candleSeries = null, volumeSeries = null;

// ==================== API ====================
async function apiFetch(path, base='fapi') {
  const baseUrl = base === 'spot'
    ? 'https://api.binance.com'
    : 'https://fapi.binance.com';
  const url = baseUrl + path;
  const timeout = 12000;

  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), timeout);
    const r = await fetch(url, { signal: ctrl.signal, mode: 'cors' });
    clearTimeout(t);
    if (r.ok) return await r.json();
  } catch(e) {}

  for (const proxy of CORS_PROXIES) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), timeout);
      const r = await fetch(proxy + encodeURIComponent(url), { signal: ctrl.signal });
      clearTimeout(t);
      if (r.ok) return await r.json();
    } catch(e) {}
  }
  return null;
}

// ==================== 格式化 ====================
function fmtNum(n, d=2) {
  if (n == null || isNaN(n)) return '--';
  return Number(n).toFixed(d);
}
function fmtMoney(n) {
  if (n == null || isNaN(n)) return '--';
  if (Math.abs(n) >= 1e8) return (n/1e8).toFixed(2) + '亿';
  if (Math.abs(n) >= 1e4) return (n/1e4).toFixed(2) + '万';
  return n.toFixed(2);
}
function fmtPrice(n) {
  if (n == null) return '--';
  if (n >= 1000) return Number(n).toLocaleString('en-US', {maximumFractionDigits:2});
  if (n >= 1) return Number(n).toFixed(4);
  if (n >= 0.01) return Number(n).toFixed(5);
  return Number(n).toFixed(8);
}
function colorClass(v) {
  return v > 0 ? 'val-up' : v < 0 ? 'val-down' : 'val-neutral';
}

// ==================== 主加载 ====================
async function loadSymbol() {
  const input = document.getElementById('symbolInput').value.trim().toUpperCase();
  if (input) currentSymbol = input.endsWith('USDT') ? input : input + 'USDT';

  document.getElementById('loadingMask').classList.remove('hidden');
  document.getElementById('loadingTip').textContent = '正在获取 ' + currentSymbol + ' 数据...';
  document.getElementById('chartLabel').textContent = currentSymbol + ' / USDT 永续合约';
  document.title = currentSymbol.replace('USDT','') + ' 币种详情';

  try {
    await Promise.all([
      loadBasicInfo(),
      loadContractPanel(),
      loadLSRatio(),
      loadFunding(),
      loadLiquidation(),
      loadKline(currentSymbol, currentTf)
    ]);
  } catch(e) {
    console.error('加载失败', e);
  }

  document.getElementById('loadingMask').classList.add('hidden');
  document.getElementById('updateTime').textContent = '更新于 ' + new Date().toLocaleTimeString('zh-CN');
}

// ==================== 基础信息 ====================
async function loadBasicInfo() {
  const [ticker, spotTicker] = await Promise.all([
    apiFetch(`/fapi/v1/ticker/24hr?symbol=${currentSymbol}`),
    apiFetch(`/api/v3/ticker/24hr?symbol=${currentSymbol}`, 'spot').catch(()=>null)
  ]);
  if (!ticker) return;

  const sym = currentSymbol.replace('USDT','');
  const price = parseFloat(ticker.lastPrice);
  const change = parseFloat(ticker.priceChangePercent);
  const vol = parseFloat(ticker.quoteVolume);
  const spotVol = spotTicker ? parseFloat(spotTicker.quoteVolume) : null;

  // Logo 首字母
  document.getElementById('coinLogo').textContent = sym.substring(0,2);
  document.getElementById('coinName').textContent = sym;
  document.getElementById('coinCode').textContent = sym + '/USDT 永续合约';
  document.getElementById('coinPrice').textContent = '$' + fmtPrice(price);
  document.getElementById('coinPrice').className = change >= 0 ? 'val-up' : 'val-down';
  const changeEl = document.getElementById('coinChange');
  changeEl.textContent = (change >= 0 ? '+' : '') + fmtNum(change, 4) + '  ' + (change >= 0 ? '+' : '') + fmtNum(change, 2) + '%';
  changeEl.className = 'coin-price-change ' + (change >= 0 ? 'up' : '');

  // 统计
  document.getElementById('coinStats').innerHTML = `
    <div class="stat-item"><div class="s-label">合约成交额</div><div class="s-val">$${fmtMoney(vol)}</div></div>
    ${spotVol ? `<div class="stat-item"><div class="s-label">现货成交额</div><div class="s-val">$${fmtMoney(spotVol)}</div></div>` : ''}
    <div class="stat-item"><div class="s-label">24H高</div><div class="s-val" style="color:#52c41a">$${fmtPrice(parseFloat(ticker.highPrice))}</div></div>
    <div class="stat-item"><div class="s-label">24H低</div><div class="s-val" style="color:#f5222d">$${fmtPrice(parseFloat(ticker.lowPrice))}</div></div>
    <div class="stat-item"><div class="s-label">成交笔数</div><div class="s-val">${Number(ticker.count).toLocaleString()}</div></div>
  `;
}

// ==================== 合约面板 ====================
async function loadContractPanel() {
  const [oi, klines] = await Promise.all([
    apiFetch(`/fapi/v1/openInterest?symbol=${currentSymbol}`),
    apiFetch(`/fapi/v1/klines?symbol=${currentSymbol}&interval=1h&limit=24`)
  ]);

  let oiVal = oi ? parseFloat(oi.openInterest) : null;
  let oiUsd = null;

  // 估算OI美元价值
  if (oiVal && klines && klines.length > 0) {
    const lastPrice = parseFloat(klines[klines.length-1][4]);
    oiUsd = oiVal * lastPrice;
  }

  // taker买卖比（近24根1H K线）
  let takerBuy = null;
  if (klines && klines.length >= 4) {
    const rec = klines.slice(-8);
    const buyVol = rec.reduce((s,x)=>s+parseFloat(x[9]),0);
    const totalVol = rec.reduce((s,x)=>s+parseFloat(x[5]),0);
    takerBuy = totalVol > 0 ? buyVol/totalVol*100 : null;
  }

  // OI变化（持仓）
  const oiHist = await apiFetch(`/futures/data/openInterestHist?symbol=${currentSymbol}&period=1h&limit=4`);
  let oiChg = null;
  if (oiHist && oiHist.length >= 2) {
    const cur = parseFloat(oiHist[0].sumOpenInterestValue);
    const prev = parseFloat(oiHist[oiHist.length-1].sumOpenInterestValue);
    if (prev > 0) oiChg = (cur - prev)/prev*100;
  }

  document.getElementById('contractPanel').innerHTML = `
    <div class="data-row">
      <span class="dr-label">合约持仓量(OI)</span>
      <span class="dr-val">${oiUsd ? '$'+fmtMoney(oiUsd) : '--'}</span>
    </div>
    <div class="data-row">
      <span class="dr-label">OI变化(4H)</span>
      <span class="dr-val ${oiChg != null ? colorClass(oiChg) : ''}">${oiChg != null ? (oiChg>0?'+':'')+fmtNum(oiChg)+'%' : '--'}</span>
    </div>
    <div class="data-row">
      <span class="dr-label">主动买入比(8H)</span>
      <span class="dr-val ${takerBuy != null ? (takerBuy>52?'val-up':takerBuy<48?'val-down':'val-neutral') : ''}">${takerBuy != null ? fmtNum(takerBuy)+'%' : '--'}</span>
    </div>
    <div class="data-row">
      <span class="dr-label">24H成交额</span>
      <span class="dr-val">加载中...</span>
    </div>
  `;

  // 补充24H成交额
  const ticker = await apiFetch(`/fapi/v1/ticker/24hr?symbol=${currentSymbol}`);
  if (ticker) {
    const vol = parseFloat(ticker.quoteVolume);
    const volChange = parseFloat(ticker.priceChangePercent);
    const rows = document.querySelectorAll('#contractPanel .data-row');
    if (rows[3]) rows[3].querySelector('.dr-val').textContent = '$'+fmtMoney(vol);
    // 加一行
    const extra = document.createElement('div');
    extra.className = 'data-row';
    extra.innerHTML = `<span class="dr-label">24H价格变化</span><span class="dr-val ${colorClass(volChange)}">${volChange>0?'+':''}${fmtNum(volChange,2)}%</span>`;
    document.getElementById('contractPanel').appendChild(extra);
  }
}

// ==================== 多空比面板 ====================
async function loadLSRatio() {
  const [globalLS, topAccountLS, topPositionLS] = await Promise.all([
    apiFetch(`/futures/data/globalLongShortAccountRatio?symbol=${currentSymbol}&period=5m&limit=1`),
    apiFetch(`/futures/data/topLongShortAccountRatio?symbol=${currentSymbol}&period=5m&limit=1`),
    apiFetch(`/futures/data/topLongShortPositionRatio?symbol=${currentSymbol}&period=5m&limit=1`)
  ]);

  const g = globalLS && globalLS[0];
  const ta = topAccountLS && topAccountLS[0];
  const tp = topPositionLS && topPositionLS[0];

  const fmt1 = v => v ? parseFloat(v).toFixed(4) : '--';
  const colorLS = v => {
    if (!v) return '';
    const n = parseFloat(v);
    return n > 1.2 ? 'val-up' : n < 0.8 ? 'val-down' : 'val-neutral';
  };

  document.getElementById('lsPanel').innerHTML = `
    <div class="data-row">
      <div>
        <div class="dr-label">24小时全局多空比</div>
      </div>
      <span class="dr-val ${colorLS(g?.longShortRatio)}">${fmt1(g?.longShortRatio)}</span>
    </div>
    <div class="data-row">
      <div>
        <div class="dr-label">Binance 账户多空比</div>
        <div class="dr-sub">${currentSymbol.replace('USDT','')} / USDT</div>
      </div>
      <span class="dr-val ${colorLS(ta?.longShortRatio)}">${fmt1(ta?.longShortRatio)}</span>
    </div>
    <div class="data-row">
      <div>
        <div class="dr-label">大账户持仓多空比</div>
        <div class="dr-sub">Binance ${currentSymbol.replace('USDT','')} / USDT</div>
      </div>
      <span class="dr-val ${colorLS(tp?.longShortRatio)}">${fmt1(tp?.longShortRatio)}</span>
    </div>
    ${g ? `
    <div class="data-row" style="margin-top:6px;padding-top:6px;border-top:1px solid #f0f0f0">
      <span class="dr-label">多头占比</span>
      <span class="dr-val val-up">${g.longAccount ? (parseFloat(g.longAccount)*100).toFixed(2)+'%' : '--'}</span>
    </div>
    <div class="data-row">
      <span class="dr-label">空头占比</span>
      <span class="dr-val val-down">${g.shortAccount ? (parseFloat(g.shortAccount)*100).toFixed(2)+'%' : '--'}</span>
    </div>` : ''}
  `;
}

// ==================== 资金费率面板 ====================
async function loadFunding() {
  const [funding, premiumIndex] = await Promise.all([
    apiFetch(`/fapi/v1/fundingRate?symbol=${currentSymbol}&limit=3`),
    apiFetch(`/fapi/v1/premiumIndex?symbol=${currentSymbol}`)
  ]);

  const cur = premiumIndex;
  const fr = cur ? parseFloat(cur.lastFundingRate)*100 : null;
  const nextFr = cur ? parseFloat(cur.nextFundingTime) : null;
  const markPrice = cur ? parseFloat(cur.markPrice) : null;
  const indexPrice = cur ? parseFloat(cur.indexPrice) : null;
  const premium = (markPrice && indexPrice) ? (markPrice - indexPrice)/indexPrice*100 : null;

  const frColor = fr != null ? (fr > 0.05 ? 'val-down' : fr < -0.01 ? 'val-up' : 'val-neutral') : '';
  const nextTime = nextFr ? new Date(nextFr).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}) : '--';

  // 历史费率
  const histRows = funding ? funding.slice(0,3).map(f => {
    const r = (parseFloat(f.fundingRate)*100).toFixed(4);
    return `<div class="data-row"><span class="dr-label">${new Date(f.fundingTime).toLocaleDateString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span><span class="dr-val ${parseFloat(r)>=0?'val-down':'val-up'}">${r}%</span></div>`;
  }).join('') : '';

  document.getElementById('fundingPanel').innerHTML = `
    <div class="data-row">
      <span class="dr-label">当前资金费率</span>
      <span class="dr-val ${frColor}">${fr != null ? (fr>0?'+':'')+fr.toFixed(4)+'%' : '--'}</span>
    </div>
    <div class="data-row">
      <span class="dr-label">下次结算</span>
      <span class="dr-val">${nextTime}</span>
    </div>
    <div class="data-row">
      <span class="dr-label">标记价格</span>
      <span class="dr-val">${markPrice ? '$'+fmtPrice(markPrice) : '--'}</span>
    </div>
    <div class="data-row">
      <span class="dr-label">溢价率</span>
      <span class="dr-val ${premium != null ? colorClass(premium) : ''}">${premium != null ? (premium>0?'+':'')+fmtNum(premium,4)+'%' : '--'}</span>
    </div>
    <div style="margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0">
      <div style="font-size:11px;color:#999;margin-bottom:4px">历史费率</div>
      ${histRows}
    </div>
  `;
}

// ==================== 爆仓数据 ====================
async function loadLiquidation() {
  // 用K线数据+OI变化近似估算爆仓（币安爆仓API限制访问）
  // 改用成交量 + Taker差异近似计算各周期爆仓规模
  const periods = [
    { id:'liq1h',  label:'1小时爆仓',  interval:'1m',  limit:60  },
    { id:'liq4h',  label:'4小时爆仓',  interval:'5m',  limit:48  },
    { id:'liq12h', label:'12小时爆仓', interval:'15m', limit:48  },
    { id:'liq24h', label:'24小时爆仓', interval:'30m', limit:48  }
  ];

  await Promise.all(periods.map(async p => {
    const klines = await apiFetch(`/fapi/v1/klines?symbol=${currentSymbol}&interval=${p.interval}&limit=${p.limit}`);
    if (!klines || !klines.length) {
      document.getElementById(p.id).innerHTML = `<div class="liq-title">${p.label}</div><div style="color:#999;font-size:12px">数据不可用</div>`;
      return;
    }

    // 估算：taker买卖差 = 强制平仓方向
    let buyLiq = 0, sellLiq = 0;
    klines.forEach(k => {
      const vol = parseFloat(k[7]);       // 成交额(USDT)
      const takerBuy = parseFloat(k[10]); // taker买入额
      const takerSell = vol - takerBuy;
      const diff = Math.abs(takerBuy - takerSell);
      if (takerSell > takerBuy) buyLiq += diff * 0.05;   // 卖压 → 估算多单爆仓
      else sellLiq += diff * 0.05;                        // 买压 → 估算空单爆仓
    });

    const total = buyLiq + sellLiq;
    document.getElementById(p.id).innerHTML = `
      <div class="liq-title">${p.label}</div>
      <div class="liq-total">$${fmtMoney(total)}</div>
      <div class="liq-row"><span class="lr-label">多单爆仓</span><span class="liq-buy">$${fmtMoney(buyLiq)}</span></div>
      <div class="liq-row"><span class="lr-label">空单爆仓</span><span class="liq-sell">$${fmtMoney(sellLiq)}</span></div>
    `;
  }));
}

// ==================== K线图 ====================
function initChart() {
  if (chart) { chart.remove(); chart = null; }

  chart = LightweightCharts.createChart(document.getElementById('chart'), {
    layout: { background: { color: '#111' }, textColor: '#aaa' },
    grid: { vertLines: { color: '#222' }, horzLines: { color: '#222' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#333' },
    timeScale: { borderColor: '#333', timeVisible: true, secondsVisible: false },
    width: document.getElementById('chart').clientWidth,
    height: document.getElementById('chart').clientHeight || 480
  });

  candleSeries = chart.addCandlestickSeries({
    upColor: '#ef5350', downColor: '#26c281',
    borderUpColor: '#ef5350', borderDownColor: '#26c281',
    wickUpColor: '#ef5350', wickDownColor: '#26c281'
  });

  volumeSeries = chart.addHistogramSeries({
    color: '#26a69a', priceFormat: { type: 'volume' },
    priceScaleId: 'volume',
    scaleMargins: { top: 0.85, bottom: 0 }
  });

  chart.priceScale('volume').applyOptions({ scaleMargins: { top: 0.85, bottom: 0 } });

  window.addEventListener('resize', () => {
    if (chart) chart.applyOptions({ width: document.getElementById('chart').clientWidth });
  });
}

async function loadKline(symbol, tf) {
  if (!chart) initChart();

  document.getElementById('klineStatus').textContent = '加载中...';

  const klines = await apiFetch(`/fapi/v1/klines?symbol=${symbol}&interval=${tf}&limit=300`);
  if (!klines || !klines.length) {
    document.getElementById('klineStatus').textContent = '❌ K线获取失败';
    return;
  }

  const candles = klines.map(k => ({
    time: Math.floor(k[0]/1000),
    open: parseFloat(k[1]), high: parseFloat(k[2]),
    low: parseFloat(k[3]), close: parseFloat(k[4])
  }));
  const volumes = klines.map(k => ({
    time: Math.floor(k[0]/1000),
    value: parseFloat(k[7]),
    color: parseFloat(k[4]) >= parseFloat(k[1]) ? 'rgba(239,83,80,0.4)' : 'rgba(38,194,129,0.4)'
  }));

  candleSeries.setData(candles);
  volumeSeries.setData(volumes);
  chart.timeScale().fitContent();

  document.getElementById('klineStatus').textContent = `✅ ${klines.length}根K线 · ${new Date(klines[klines.length-1][0]).toLocaleString('zh-CN')}`;
  document.getElementById('chartLabel').textContent = `${symbol.replace('USDT','')} / USDT · ${tf.toUpperCase()} · 永续合约`;
}

function changeTf(tf) {
  currentTf = tf;
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  loadKline(currentSymbol, tf);
}

// ==================== 初始化 ====================
window.onload = function() {
  // 从 URL 参数读取 symbol
  const params = new URLSearchParams(location.search);
  const sym = params.get('symbol') || params.get('s');
  if (sym) {
    currentSymbol = sym.toUpperCase().endsWith('USDT') ? sym.toUpperCase() : sym.toUpperCase() + 'USDT';
    document.getElementById('symbolInput').value = currentSymbol.replace('USDT','');
  }

  // 初始化图表
  initChart();

  // 加载数据
  loadSymbol();

  // 回车搜索
  document.getElementById('symbolInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadSymbol();
  });
};
